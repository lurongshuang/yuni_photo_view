name: yuni_photo_view
description: >-
  Full-screen Flutter viewer shell: paging, zoom, info sheet, dismiss, bars,
  overlays, desktop toolbar. You render media in pageBuilder; includes Hero helpers.
version: 0.2.6
homepage: https://github.com/lurongshuang/yuni_photo_view
repository: https://github.com/lurongshuang/yuni_photo_view
issue_tracker: https://github.com/lurongshuang/yuni_photo_view

topics:
  - flutter
  - gallery
  - photo-viewer
  - fullscreen
  - pager

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  web: ^1.0.0
  plugin_platform_interface: ^2.0.2
  photo_view: ^0.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.uneed.yuni_photo_view
        pluginClass: YuniPhotoViewPlugin
      ios:
        pluginClass: YuniPhotoViewPlugin
      linux:
        pluginClass: YuniPhotoViewPlugin
      macos:
        pluginClass: YuniPhotoViewPlugin
      windows:
        pluginClass: YuniPhotoViewPluginCApi
      web:
        pluginClass: YuniPhotoViewWeb
        fileName: lib/yuni_photo_view_web.dart
