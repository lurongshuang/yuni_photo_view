name: yuni_photo_view
description: >
  A Flutter viewer interaction framework.
  Provides full-screen paging, configurable gestures, a slide-up info panel,
  and customisable overlay slots. Does NOT render media content — that is
  fully delegated to the business application.
version: 0.1.0
homepage: https://github.com/uneed/yuni_photo_view

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  web: ^1.0.0
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.uneed.yuni_photo_view
        pluginClass: YuniPhotoViewPlugin
      ios:
        pluginClass: YuniPhotoViewPlugin
      linux:
        pluginClass: YuniPhotoViewPlugin
      macos:
        pluginClass: YuniPhotoViewPlugin
      windows:
        pluginClass: YuniPhotoViewPluginCApi
      web:
        pluginClass: YuniPhotoViewWeb
        fileName: lib/yuni_photo_view_web.dart
